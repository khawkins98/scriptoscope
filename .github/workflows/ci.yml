name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Gates + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Bake the gitignored per-theme derivatives (theme.json + cicns/ +
      # ppats/ + icons/ + resource-roles.json + extraction-manifest.json).
      # Bundles ship source-of-truth only (.sit/.rsrc + meta.json); the
      # derivatives are produced on-demand and consumed by `audit:scenes`.
      # All pure Node — see the "Option A" block in CLAUDE.md Architecture.
      - name: Bake theme derivatives (required by audit:scenes)
        run: npm run build:themes

      # Build the library FIRST. `lint:themes --strict` re-decodes every
      # bundle and imports PixelBuffer from `dist/scriptoscope.js` to do
      # so — on a fresh CI checkout, dist/ does not exist yet. Locally the
      # maintainer's pre-push `npm run gates` works because they typically
      # have a stale `dist/` from prior dev. Order matters on a clean tree.
      - name: Library build
        run: npm run build

      # The maintainer-defined pre-push umbrella — typecheck + test +
      # lint:themes --strict + audit:scenes --check. All four are pure
      # Node (no browser / canvas / Puppeteer), so they're CI-safe as-is
      # and catch what's statically detectable: TS errors, decoder
      # regressions, re-decode drift against the source-archive sha256
      # baseline, and any Scene slot dropping to its hard fallback.
      # Mirrors `npm run gates` locally — see CLAUDE.md "Commands".
      - name: Gates (typecheck + test + lint --strict + audit --check)
        run: npm run gates
