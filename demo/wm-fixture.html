<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WM Core Fixture</title>
  <!--
    Minimal harness for Playwright e2e tests against the AaronWindow
    class itself (not the demo's inline JS). Loads via Vite dev server,
    which compiles src/index.ts on the fly. When issue #10 lands the
    proper WM-core test fixture, this can graduate to
    tests/e2e/fixtures/wm-core.html and the playwright config gets
    pointed at it explicitly.
  -->
  <style>
    body { margin: 0; padding: 0; font: 14px sans-serif; background: #888; }
    .aaron-window {
      background: white;
      border: 1px solid black;
    }
    .aaron-titlebar {
      background: linear-gradient(to bottom, #eee, #ccc);
      border-bottom: 1px solid #888;
      padding: 4px 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <script type="module">
    import { AaronWindow, windowManager } from '../src/index.ts';
    window.AaronWindow = AaronWindow;
    window.windowManager = windowManager;

    // Event recorder so tests can verify callback firing order/timing
    // without coupling to internal class state.
    window.events = [];
    const record = (type, name) => () => window.events.push({ type, window: name });

    const a = new AaronWindow({
      title: 'Window A', x: 100, y: 100, width: 320, height: 200,
      oncreate: record('create', 'a'),
      onclose:  record('close',  'a'),
      onfocus:  record('focus',  'a'),
      onblur:   record('blur',   'a'),
      onmove:   (x, y) => window.events.push({ type: 'move', window: 'a', x, y }),
      onresize: (w, h) => window.events.push({ type: 'resize', window: 'a', w, h }),
    });
    const b = new AaronWindow({ title: 'Window B', x: 200, y: 150, width: 320, height: 200 });
    const c = new AaronWindow({ title: 'Window C', x: 300, y: 200, width: 320, height: 200 });
    a.mount(); b.mount(); c.mount();
    window.windows = { a, b, c };
    window.testWindow = a;
    // Test helper: clear the event log between assertions
    window.clearEvents = () => { window.events = []; };
  </script>
</body>
</html>
