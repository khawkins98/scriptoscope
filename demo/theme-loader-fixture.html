<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theme Loader Fixture</title>
  <!--
    E2E fixture for Phase 4.4 (#38): loadTheme() core. The test navigates here,
    calls loadTheme('/themes/masswerk-7-le/'), and asserts the Colr palette
    becomes :root CSS custom properties.

    This fixture exists so the e2e suite exercises the real Vite-served
    pipeline (canonical bundle at /themes/<slug>/, fetched + parsed + applied
    by the real runtime), not just jsdom-mocked fetch.
  -->
</head>
<body>
  <div id="status">idle</div>
  <button id="load-7le">Load 7 Le</button>
  <button id="load-ergobox">Load ErgoBox 2</button>
  <button id="unload">Unload</button>

  <script type="module">
    // no-default entry: skips the bundled-default auto-load. This fixture
    // tests loadTheme in isolation, so we don't want the auto-load racing
    // with the test's "dispatches themechange" assertion.
    import { loadTheme, themeRegistry } from '../src/no-default.ts';

    const status = document.getElementById('status');
    const setStatus = (s) => { status.textContent = s; };

    // Relative paths so the same fixture works under Vite dev root (`/`)
    // and gh-pages base (`/aaron-ui/`). loadTheme resolves against
    // document.baseURI.
    document.getElementById('load-7le').addEventListener('click', async () => {
      setStatus('loading-7le');
      try {
        await loadTheme('themes/masswerk-7-le/');
        setStatus('loaded-7le');
      } catch (e) {
        setStatus(`error: ${e.message}`);
      }
    });

    document.getElementById('load-ergobox').addEventListener('click', async () => {
      setStatus('loading-ergobox');
      try {
        await loadTheme('themes/masswerk-dark-ergobox2/');
        setStatus('loaded-ergobox');
      } catch (e) {
        setStatus(`error: ${e.message}`);
      }
    });

    document.getElementById('unload').addEventListener('click', () => {
      themeRegistry.replace(null);
      setStatus('unloaded');
    });

    // Expose for test inspection.
    window.__aaronTheme = { loadTheme, themeRegistry };
  </script>
</body>
</html>
