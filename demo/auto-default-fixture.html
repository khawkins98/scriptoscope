<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aaron UI — bundled-default auto-load fixture (Phase 4.5)</title>
  <!--
    E2E fixture for Phase 4.5 (#39). Imports `aaron-ui` (the main entry
    that triggers enableBundledDefault as a side-effect), mounts an
    AaronWindow, and attaches it to the theme registry. NO manual
    loadTheme() call. NO data-aaron-theme attribute.

    Expected: bundled mass:werk 7 Le auto-loads on DOMContentLoaded,
    palette applies to :root, AaronWindow's chrome renders.
  -->
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Lucida Grande", sans-serif;
      background: var(--aaron-colr-bg, #cccccc);
      color: var(--aaron-colr-fg, #000);
      min-height: 100vh;
    }
    #status {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 12px;
      padding: 4px 8px;
      background: rgba(0,0,0,0.08);
      border-radius: 3px;
    }
    .aaron-window {
      background: var(--aaron-colr-bg, white);
      border: 1px solid var(--aaron-colr-window-frame, #888);
    }
    .aaron-titlebar {
      position: relative;
      height: 25px;
      min-height: 25px;
    }
    .aaron-titlebar__title {
      position: absolute;
      left: var(--aaron-title-pill-left, 0);
      right: var(--aaron-title-pill-right, 0);
      top: 0;
      bottom: 0;
      padding: 0 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      pointer-events: none;
      overflow: hidden;
      white-space: nowrap;
      z-index: 2;
    }
    .aaron-titlebar__title > span {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .aaron-content {
      padding: 16px;
    }
  </style>
</head>
<body>
  <p>
    No <code>loadTheme()</code> call. No <code>data-aaron-theme</code>.
    Just <code>import 'aaron-ui'</code> — the bundled default should
    auto-load and theme this window.
    <span id="status">booting</span>
  </p>

  <script type="module">
    // Importing the main entry triggers enableBundledDefault as a side-effect.
    import { AaronWindow, attachThemeToWindow, themeRegistry } from '../src/index.ts';

    const win = new AaronWindow({
      title: 'Auto-themed window',
      x: 24,
      y: 80,
      width: 400,
      height: 200,
      html: '<p>This page does not call loadTheme(). The bundled default fires on DOMContentLoaded.</p>',
    });
    win.mount(document.body);
    attachThemeToWindow(win.element, { windowTypeSlug: 'document-window' });

    // Surface the loaded-theme state for e2e assertions.
    const status = document.getElementById('status');
    const update = () => {
      const t = themeRegistry.current();
      status.textContent = t ? `auto-loaded: ${t.name ?? 'unknown'}` : 'no-theme';
    };
    themeRegistry.subscribe(update);
    update();

    window.__aaronTheme = { win, themeRegistry };
  </script>
</body>
</html>
