<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aaron UI v2 — runtime</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, system-ui, sans-serif;
      background: #b9b9b9;
      color: #1a1a1a;
    }
    header { padding: 20px 24px 4px; }
    header h1 { font-size: 18px; margin: 0; }
    header p { margin: 4px 0 0; opacity: 0.65; font-size: 13px; }

    .theme-row { border-top: 1px solid #999; padding: 8px 24px 20px; }
    .theme-row > h2 { font-size: 15px; margin: 8px 0 2px; }
    .row { display: flex; flex-wrap: nowrap; gap: 20px; align-items: flex-start; overflow-x: auto; padding-bottom: 6px; }
    .col { display: flex; flex-direction: column; gap: 8px; }
    .col h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
      opacity: 0.5; margin: 0; font-weight: 700;
    }
    .frame {
      background: #c8c8c8; padding: 14px; border: 1px solid #999;
      box-shadow: inset 0 0 0 1px #fff6; overflow: hidden;
    }
    .frame img { image-rendering: pixelated; display: block; }
    .ctl-stack { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
    .ctl-row { display: flex; gap: 12px; align-items: flex-start; }
    .btn-stack { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  </style>
</head>
<body>
  <header>
    <h1>Aaron UI <span id="ver"></span> — runtime</h1>
    <p>Each Kaleidoscope theme, rendered on the fly at <strong>native pixel size</strong>: scene · controls · buttons · reference screenshot.</p>
  </header>
  <div id="rows"></div>

  <script type="module">
    import {
      VERSION, loadTheme, renderWindow,
      composeScrollbar, composeSlider, composeDisclosure, composeProgress,
      composeButton, composeCheckable,
      baselineButton, baselineCheckable, bufferToCanvas,
    } from '../src/index.ts';
    document.getElementById('ver').textContent = `v${VERSION}`;
    const rows = document.getElementById('rows');

    const THEMES = [
      { slug: 'apple-platinum-2', label: 'Apple Platinum 2', ref: 'apple-platinum-2.png' },
      { slug: 'beos-r503', label: 'BeOS R5.0.3', ref: 'beos-r503.png' },
      { slug: '1990', label: '1990', ref: '1990.png' },
      { slug: '1138', label: '1138', ref: '1138.png' },
      { slug: '1984', label: '1984', ref: '1984.png' },
      { slug: 'evolution', label: 'Evolution', ref: 'evolution.png' },
    ];

    function colEl(label) {
      const c = document.createElement('div'); c.className = 'col';
      const h = document.createElement('h3'); h.textContent = label;
      const frame = document.createElement('div'); frame.className = 'frame';
      c.append(h, frame);
      return { c, frame };
    }
    const add = (frame, buf) => { if (buf) frame.appendChild(bufferToCanvas(buf, 1)); };

    // Folder icons for the Finder window content — neutral SVGs (OS icons,
    // not scheme chrome).
    const ICON_SVG = {
      folder: '<svg width="36" height="27" viewBox="0 0 36 27"><path d="M2 6 h11 l3 3 h18 v15 h-32 z" fill="#dccfa3" stroke="#7a6a3a" stroke-width="1"/><path d="M2 9 h32 v13 h-32 z" fill="#e8dcb6" stroke="#7a6a3a" stroke-width="1"/></svg>',
      folderOpen: '<svg width="36" height="27" viewBox="0 0 36 27"><path d="M2 6 h11 l3 3 h18 v15 h-32 z" fill="#cdbf90" stroke="#7a6a3a"/><path d="M6 11 h30 l-4 11 h-30 z" fill="#efe4bd" stroke="#7a6a3a"/></svg>',
    };

    // A segmented TAB control (e.g. On | Off), tinted with the scheme's
    // header colors. Selected cell uses the header fill/text; others a light
    // Platinum face. Reads as tabs rather than two separate push buttons.
    function segmentedTabs(theme, labels, selectedIdx) {
      const hc = theme.manifest?.headerColors?.active ?? {};
      const fill = hc.fill ?? '#5a5a5a';
      const text = hc.text ?? '#ffffff';
      const frame = hc.frame ?? '#555555';
      const wrap = document.createElement('div');
      Object.assign(wrap.style, {
        display: 'inline-flex', border: `1px solid ${frame}`, borderRadius: '3px',
        overflow: 'hidden', font: '11px Charcoal, Geneva, sans-serif',
      });
      labels.forEach((label, i) => {
        const cell = document.createElement('div');
        const sel = i === selectedIdx;
        Object.assign(cell.style, {
          padding: '2px 12px', borderLeft: i > 0 ? `1px solid ${frame}` : 'none',
          background: sel ? fill : 'linear-gradient(180deg,#fff,#dcdcdc)',
          color: sel ? text : '#000', fontWeight: sel ? '700' : '400',
        });
        cell.textContent = label;
        wrap.appendChild(cell);
      });
      return wrap;
    }

    // Compose the canonical Kaleidoscope scheme-preview layout: a "Hello!"
    // Finder window (scheme-name info bar, two folders, a radio/checkbox row,
    // edge scrollbars + grow box) with an overlapping "On/Off" modal dialog
    // (segmented buttons, a progress bar, a disclosure + default OK) — the
    // same arrangement the reference screenshots use, so the live render is
    // directly comparable.
    async function buildScene(theme) {
      const desk = document.createElement('div');
      Object.assign(desk.style, {
        position: 'relative', width: '232px', height: '190px', overflow: 'hidden',
        background: '#9d9d9d',
        backgroundImage: 'repeating-conic-gradient(#9a9a9a 0 25%, #a4a4a4 0 50%)',
        backgroundSize: '4px 4px',
      });
      const cv = (buf) => bufferToCanvas(buf, 1);
      const place = (buf, css) => { if (!buf) return; const c = cv(buf); Object.assign(c.style, { position: 'absolute', ...css }); return c; };

      // ── main "Hello!" Finder window (top-left) ──
      const winW = 132, winH = 96;
      const win = await renderWindow(theme, { title: 'Hello!', width: winW, height: winH, scale: 1 });
      Object.assign(win.style, { position: 'absolute', left: '6px', top: '8px' });
      const content = win.querySelector('.aw-content');
      if (content) {
        Object.assign(content.style, { overflow: 'hidden' });
        // scheme-name info bar (the Finder window's volume header)
        const info = document.createElement('div');
        info.textContent = theme.manifest?.name ?? '';
        Object.assign(info.style, { position: 'absolute', left: '0', top: '0', right: '0', height: '13px', boxSizing: 'border-box', padding: '1px 4px', borderBottom: '1px solid #aaa', background: '#e6e6e6', font: '9px Charcoal, Geneva, sans-serif', whiteSpace: 'nowrap', overflow: 'hidden' });
        content.appendChild(info);
        // two folder icons
        const folders = document.createElement('div');
        Object.assign(folders.style, { position: 'absolute', left: '8px', top: '18px', display: 'flex', gap: '10px' });
        const f1 = document.createElement('div'); f1.innerHTML = ICON_SVG.folderOpen;
        const f2 = document.createElement('div'); f2.innerHTML = ICON_SVG.folder;
        folders.append(f1.firstChild, f2.firstChild);
        content.appendChild(folders);
        // radio / checkbox control row
        const chk = async (kind, o) => { const b = await composeCheckable(theme, kind, { label: '', ...o }); return b ? cv(b) : baselineCheckable(kind, '', o); };
        const ctlRow = document.createElement('div');
        Object.assign(ctlRow.style, { position: 'absolute', left: '8px', top: '52px', display: 'flex', gap: '7px', alignItems: 'center' });
        ctlRow.append(await chk('radio', {}), await chk('radio', { checked: true }), await chk('checkbox', { checked: true }), await chk('checkbox', {}));
        content.appendChild(ctlRow);
        // edge scrollbars + grow box (Finder window furniture)
        const vsb = await composeScrollbar(theme, { orientation: 'vertical', length: winH - 15, value: 0.25 });
        const vc = place(vsb, { right: '0', top: '0' }); if (vc) content.appendChild(vc);
        const hsb = await composeScrollbar(theme, { orientation: 'horizontal', length: winW - 15, value: 0.25 });
        const hc = place(hsb, { left: '0', bottom: '0' }); if (hc) content.appendChild(hc);
        const grow = document.createElement('div');
        Object.assign(grow.style, { position: 'absolute', right: '0', bottom: '0', width: '15px', height: '15px', background: '#e6e6e6', borderLeft: '1px solid #999', borderTop: '1px solid #999' });
        content.appendChild(grow);
      }
      desk.appendChild(win);

      // ── "On/Off" modal dialog (overlapping, center-right) ──
      const dlg = await renderWindow(theme, { windowType: 'movable-modal-dialog', title: '', width: 100, height: 82, scale: 1 });
      Object.assign(dlg.style, { position: 'absolute', left: '96px', top: '56px', zIndex: '5' });
      const dc = dlg.querySelector('.aw-content');
      if (dc) {
        Object.assign(dc.style, { padding: '5px', display: 'flex', flexDirection: 'column', gap: '4px', boxSizing: 'border-box' });
        const btn = async (label, o) => { const b = await composeButton(theme, { label, minWidth: o.minWidth, ...o }); return b ? cv(b) : baselineButton(label, o); };
        // On/Off is a segmented TAB control (not two push buttons), tinted
        // with the scheme's header colors for the selected cell.
        dc.appendChild(segmentedTabs(theme, ['On', 'Off'], 0));
        const pg = await composeProgress(theme, { length: 86, value: 0.45 });
        if (pg) dc.appendChild(cv(pg));
        const foot = document.createElement('div'); foot.style.cssText = 'display:flex;gap:6px;align-items:center;justify-content:flex-end;margin-top:auto';
        const disc = await composeDisclosure(theme, { direction: 'right' });
        if (disc) foot.appendChild(cv(disc));
        foot.appendChild(await btn('OK', { default: true }));
        dc.appendChild(foot);
      }
      desk.appendChild(dlg);
      return desk;
    }

    for (const t of THEMES) {
      const section = document.createElement('div'); section.className = 'theme-row';
      const title = document.createElement('h2'); title.textContent = t.label;
      const row = document.createElement('div'); row.className = 'row';
      section.append(title, row);

      let theme;
      try { theme = await loadTheme(`/themes/${t.slug}`); }
      catch (e) { row.textContent = `failed to load: ${e}`; rows.appendChild(section); continue; }

      // scene
      { const { c, frame } = colEl('scene'); try { frame.appendChild(await buildScene(theme)); } catch (e) { frame.textContent = String(e); } row.appendChild(c); }
      // reference — next to the scene for direct side-by-side comparison
      { const { c, frame } = colEl('reference'); const img = document.createElement('img'); img.src = `./assets/references/${t.ref}`; frame.appendChild(img); row.appendChild(c); }
      // controls
      {
        const { c, frame } = colEl('controls');
        const stack = document.createElement('div'); stack.className = 'ctl-stack';
        const r1 = document.createElement('div'); r1.className = 'ctl-row';
        const r2 = document.createElement('div'); r2.className = 'ctl-row';
        add(r1, await composeScrollbar(theme, { orientation: 'horizontal', length: 140, value: 0.35 }));
        add(r1, await composeScrollbar(theme, { orientation: 'vertical', length: 90, value: 0.5 }));
        add(r2, await composeSlider(theme, { orientation: 'horizontal', length: 120, value: 0.4 }));
        add(r2, await composeProgress(theme, { length: 110, value: 0.6 }));
        add(r2, await composeDisclosure(theme, { direction: 'right' }));
        add(r2, await composeDisclosure(theme, { direction: 'down' }));
        stack.append(r1, r2);
        if (!r1.childElementCount && !r2.childElementCount) frame.textContent = '(no themed control cicns — baseline)';
        else frame.appendChild(stack);
        row.appendChild(c);
      }
      // buttons — themed where the scheme ships push-button cicns, else baseline
      {
        const { c, frame } = colEl('buttons');
        const stack = document.createElement('div'); stack.className = 'btn-stack';
        const brow = document.createElement('div'); brow.style.cssText = 'display:flex;gap:6px;align-items:center';
        const btn = async (label, o) => {
          const buf = await composeButton(theme, { label, ...o });
          return buf ? bufferToCanvas(buf, 1) : baselineButton(label, o);
        };
        brow.append(await btn('Cancel', {}), await btn('OK', { default: true }), await btn('Help', { disabled: true }));
        const chk = async (kind, label, o) => {
          const buf = await composeCheckable(theme, kind, { label, ...o });
          return buf ? bufferToCanvas(buf, 1) : baselineCheckable(kind, label, o);
        };
        stack.append(brow, await chk('checkbox', 'Show invisibles', { checked: true }), await chk('radio', 'On', { checked: true }));
        frame.appendChild(stack);
        row.appendChild(c);
      }

      rows.appendChild(section);
    }
  </script>
</body>
</html>
