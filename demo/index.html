<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aaron UI v2 — slice 1</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, system-ui, sans-serif;
      background: #b9b9b9;
      color: #1a1a1a;
      min-height: 100vh;
    }
    header { padding: 20px 24px 0; }
    header h1 { font-size: 18px; margin: 0; }
    header p { margin: 4px 0 0; opacity: 0.65; font-size: 13px; }
    .stage {
      display: flex; flex-wrap: nowrap; gap: 24px;
      padding: 16px 24px 24px;
      align-items: flex-start;
      overflow-x: auto;
    }
    .col { display: flex; flex-direction: column; gap: 10px; }
    .col h2 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      opacity: 0.55; margin: 0; font-weight: 700;
    }
    .frame {
      background: #c8c8c8;
      padding: 16px;
      border: 1px solid #999;
      box-shadow: inset 0 0 0 1px #fff6;
    }
    .reference img {
      image-rendering: pixelated;
      display: block;
      /* native 240×200, shown at integer 2× so it's pixel-comparable */
      width: 480px;
      height: 400px;
    }
    .note { font-size: 12px; opacity: 0.7; max-width: 280px; }
    code { font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Aaron UI <span id="ver"></span> — recipe compositor</h1>
    <p>Document windows fully composed from each scheme's <code>wnd#</code> recipe (2×) — title rasterized into the buffer too — with the reference in the third column.</p>
  </header>
  <div id="stage"></div>

  <script type="module">
    import { VERSION, loadTheme, renderWindow } from '../src/index.ts';
    document.getElementById('ver').textContent = `v${VERSION}`;
    const stage = document.getElementById('stage');

    const schemes = [
      { slug: 'masswerk-7-le', label: '7 Le', ref: './assets/references/masswerk-7-le.jpg' },
      { slug: 'masswerk-dark-ergobox2', label: 'ErgoBox 2', ref: './assets/references/masswerk-dark-ergobox2.jpg' },
    ];
    const states = ['active', 'inactive'];

    function col(label) {
      const c = document.createElement('div');
      c.className = 'col';
      const h = document.createElement('h2');
      h.textContent = label;
      const frame = document.createElement('div');
      frame.className = 'frame';
      c.append(h, frame);
      return { c, frame };
    }

    for (const s of schemes) {
      const theme = await loadTheme(`/themes/${s.slug}`);
      const row = document.createElement('div');
      row.className = 'stage';
      for (const state of states) {
        const { c, frame } = col(`${s.label} · ${state}`);
        try {
          frame.appendChild(await renderWindow(theme, { title: 'Hello!', width: 150, height: 100, scale: 2, state }));
        } catch (err) {
          frame.textContent = String(err);
        }
        row.appendChild(c);
      }
      const { c, frame } = col(`${s.label} · reference`);
      const img = document.createElement('img');
      img.src = s.ref;
      img.style.imageRendering = 'pixelated';
      img.style.maxWidth = '340px';
      frame.appendChild(img);
      row.appendChild(c);
      stage.appendChild(row);
    }
  </script>
</body>
</html>
