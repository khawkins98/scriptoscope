<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aaron UI v2 — runtime</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, system-ui, sans-serif;
      background: #b9b9b9;
      color: #1a1a1a;
    }
    header { padding: 20px 24px 4px; }
    header h1 { font-size: 18px; margin: 0; }
    header p { margin: 4px 0 0; opacity: 0.65; font-size: 13px; }

    .theme-row { border-top: 1px solid #999; padding: 8px 24px 20px; }
    .theme-row > h2 { font-size: 15px; margin: 8px 0 2px; }
    .row { display: flex; flex-wrap: nowrap; gap: 20px; align-items: flex-start; overflow-x: auto; padding-bottom: 6px; }
    .col { display: flex; flex-direction: column; gap: 8px; }
    .col h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
      opacity: 0.5; margin: 0; font-weight: 700;
    }
    .frame {
      background: #c8c8c8; padding: 14px; border: 1px solid #999;
      box-shadow: inset 0 0 0 1px #fff6; overflow: hidden;
    }
    .frame img { image-rendering: pixelated; display: block; }
    .ctl-stack { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
    .ctl-row { display: flex; gap: 12px; align-items: flex-start; }
    .btn-stack { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  </style>
</head>
<body>
  <header>
    <h1>Aaron UI <span id="ver"></span> — runtime</h1>
    <p>Each Kaleidoscope theme, rendered on the fly at <strong>native pixel size</strong>: scene · controls · buttons · reference screenshot.</p>
  </header>
  <div id="rows"></div>

  <script type="module">
    import {
      VERSION, loadTheme, renderWindow,
      composeScrollbar, composeSlider, composeDisclosure, composeProgress, composeTab,
      composeButton, composeCheckable, composeGrowBox,
      baselineButton, bufferToCanvas,
      platinumCheckable, platinumSlider, platinumButton, platinumScrollbar, platinumDisclosure,
    } from '../src/index.ts';
    document.getElementById('ver').textContent = `v${VERSION}`;
    const rows = document.getElementById('rows');

    // Theme bundles live under the deploy base: `/` in dev (vite middleware
    // serves repo-root themes/ at /themes/) but `/aaron-ui/` on GitHub Pages.
    // BASE_URL carries that prefix (and a trailing slash) in both, so theme
    // fetches resolve in either — a bare `/themes/…` 404s on Pages.
    const themeUrl = (slug) => `${import.meta.env.BASE_URL}themes/${slug}`;

    // Active/inactive toggle — our scene renderer can show BOTH window states
    // live (the reference screenshots are frozen in one state). Re-renders the
    // scene column for every theme on change.
    let sceneState = 'active';
    const scenes = [];
    async function renderScene(entry) {
      entry.frame.textContent = '';
      try { entry.frame.appendChild(await buildScene(entry.theme, sceneState)); }
      catch (e) { entry.frame.textContent = String(e); }
    }
    {
      const bar = document.createElement('div');
      bar.style.cssText = 'padding:0 24px 8px;display:flex;gap:8px;align-items:center;font:13px system-ui';
      const lab = document.createElement('label'); lab.style.cssText = 'display:flex;gap:6px;align-items:center;cursor:pointer';
      const cb = document.createElement('input'); cb.type = 'checkbox';
      cb.onchange = async () => { sceneState = cb.checked ? 'inactive' : 'active'; for (const e of scenes) await renderScene(e); };
      lab.append(cb, document.createTextNode('Show windows as inactive'));
      bar.appendChild(lab);
      document.querySelector('header').appendChild(bar);
    }

    const THEMES = [
      { slug: 'apple-platinum-2', label: 'Apple Platinum 2', ref: 'apple-platinum-2.png' },
      { slug: 'beos-r503', label: 'BeOS R5.0.3', ref: 'beos-r503.png' },
      { slug: '1990', label: '1990', ref: '1990.png' },
      { slug: '1138', label: '1138', ref: '1138.png' },
      { slug: '1984', label: '1984', ref: '1984.png' },
      { slug: 'evolution', label: 'Evolution', ref: 'evolution.png' },
      { slug: 'apple-platinum-replica', label: 'Apple Platinum (replica) ✦ generated' },
    ];

    function colEl(label) {
      const c = document.createElement('div'); c.className = 'col';
      const h = document.createElement('h3'); h.textContent = label;
      const frame = document.createElement('div'); frame.className = 'frame';
      c.append(h, frame);
      return { c, frame };
    }
    const add = (frame, buf) => { if (buf) frame.appendChild(bufferToCanvas(buf, 1)); };

    // Checkbox/radio: themed (scheme cicns, label baked in) where shipped,
    // else a procedural gray-Platinum glyph + DOM label.
    async function checkableEl(theme, kind, label, o = {}) {
      const buf = await composeCheckable(theme, kind, { label, ...o });
      if (buf) return bufferToCanvas(buf, 1);
      const row = document.createElement('label');
      row.style.cssText = 'display:inline-flex;align-items:center;gap:5px;font:12px Charcoal,Geneva,sans-serif;color:' + (o.disabled ? '#9a9a9a' : '#000');
      row.appendChild(bufferToCanvas(platinumCheckable(kind, o), 1));
      if (label) { const t = document.createElement('span'); t.textContent = label; row.appendChild(t); }
      return row;
    }
    // Slider: themed where shipped, else procedural gray-Platinum.
    async function sliderEl(theme, o = {}) {
      const buf = (await composeSlider(theme, o)) ?? platinumSlider(o);
      return bufferToCanvas(buf, 1);
    }

    // Folder icons for the Finder window content — neutral SVGs (OS icons,
    // not scheme chrome).
    const ICON_SVG = {
      folder: '<svg width="36" height="27" viewBox="0 0 36 27"><path d="M2 6 h11 l3 3 h18 v15 h-32 z" fill="#dccfa3" stroke="#7a6a3a" stroke-width="1"/><path d="M2 9 h32 v13 h-32 z" fill="#e8dcb6" stroke="#7a6a3a" stroke-width="1"/></svg>',
      folderOpen: '<svg width="36" height="27" viewBox="0 0 36 27"><path d="M2 6 h11 l3 3 h18 v15 h-32 z" fill="#cdbf90" stroke="#7a6a3a"/><path d="M6 11 h30 l-4 11 h-30 z" fill="#efe4bd" stroke="#7a6a3a"/></svg>',
    };

    // The scheme's OWN icons (decoded icl4 → themes/<slug>/icons/), shown as the
    // Finder-window content. Match what the REFERENCE screenshots show — they all
    // feature the scheme's themed FOLDER icons — by selecting the well-known
    // standard FOLDER icon IDs in priority order, rather than whatever sorts first
    // by coverage (which gave arbitrary system folders like "Internet Search
    // Sites"). Folders first (the references rarely show documents); -3984 is a
    // document/trash glyph in some schemes, so it's a last resort. Falls back to
    // coverage-ranked icons to fill, then to the SVG folders when a scheme ships
    // no icl4 at all (e.g. 1990).
    // SYSTEMATIC icon selection — works for ANY loaded theme, not just our corpus.
    // Kaleidoscope themes the standard Mac System-icon suite by FIXED resource ids
    // (Generic Folder is always -3999, System Folder -3983, Open Folder -3997,
    // Finder -16482, …), so the id tells us each icon's ROLE regardless of theme.
    // The scene mocks a FINDER WINDOW, whose contents are FOLDERS (the Finder app
    // icon -16482 lives on the desktop, not inside a window — which is why every
    // reference shows folders). So request the standard FOLDER icons in role order
    // and take whichever the theme ships; fall through to coverage-ranked icons,
    // then the neutral SVG folders only when a theme themes no folders at all
    // (1990, apple-platinum-2). Non-folder roles (trash -3984/-3993, app -3970,
    // item -16455, Finder -16482) are last-resort fallbacks, never preferred.
    const FINDER_CONTENT_ICON_IDS = [
      -3983, // System Folder (the iconic Mac-badged folder — lead icon)
      -3999, // Generic Folder (closed)
      -3997, // Open Folder
      -3994, // Generic/Private Folder
      -3976, // Control Panels Folder
      -3970, -3984, -4000, -16455, -16482, // last resorts (app/trash/item/Finder)
    ];
    const _iconCache = new Map();
    async function schemeIcons(theme, n) {
      if (!_iconCache.has(theme.baseUrl)) {
        _iconCache.set(theme.baseUrl, (async () => {
          try {
            const r = await fetch(`${theme.baseUrl}/icons/index.json`);
            if (!r.ok) return [];
            const idx = await r.json();
            const icl4 = idx.filter((i) => i.type === 'icl4');
            const byId = new Map(icl4.map((i) => [i.id, i]));
            const picked = [];
            for (const id of FINDER_CONTENT_ICON_IDS) { const i = byId.get(id); if (i) picked.push(i); }
            const seen = new Set(picked.map((i) => i.id));
            const cov = icl4.filter((i) => i.coverage > 0.18 && i.coverage < 0.95 && !seen.has(i.id));
            return picked.concat(cov).slice(0, 8);
          } catch { return []; }
        })());
      }
      const list = await _iconCache.get(theme.baseUrl);
      return list.slice(0, n).map((i) => {
        const img = document.createElement('img');
        img.src = `${theme.baseUrl}/icons/${i.file}`;
        img.title = `${i.type} ${i.id} — scheme icon`;
        Object.assign(img.style, { width: '28px', height: '28px', imageRendering: 'pixelated', display: 'block' });
        return img;
      });
    }

    // DIAGNOSTIC: a collapsible inventory of every icl4 icon a theme ships
    // (image + resource id + name), so we can see exactly which standard system
    // icons (Finder -16482, System Folder -3983, Generic Folder -3999, …) are
    // present and pick the right ones for the scene. Named icons sort first.
    async function iconInventory(theme) {
      const det = document.createElement('details');
      det.style.cssText = 'margin:4px 24px 16px; font:11px system-ui; color:#444';
      const sum = document.createElement('summary');
      sum.style.cssText = 'cursor:pointer; color:#555; font-weight:600; padding:4px 0';
      det.appendChild(sum);
      let all = [];
      try { const r = await fetch(`${theme.baseUrl}/icons/index.json`); if (r.ok) all = await r.json(); } catch {}
      const icl4 = all.filter((i) => i.type === 'icl4')
        .sort((a, b) => (b.name ? 1 : 0) - (a.name ? 1 : 0) || a.id - b.id);
      sum.textContent = `Icon inventory — ${icl4.length} icl4 icons (click to expand)`;
      const grid = document.createElement('div');
      grid.style.cssText = 'display:flex; flex-wrap:wrap; gap:6px; padding:8px 0';
      for (const i of icl4) {
        const cell = document.createElement('div');
        cell.style.cssText = 'width:86px; text-align:center; font:9px/1.15 system-ui; color:#555';
        const img = document.createElement('img');
        img.src = `${theme.baseUrl}/icons/${i.file}`; img.loading = 'lazy';
        Object.assign(img.style, { width: '32px', height: '32px', imageRendering: 'pixelated', display: 'block', margin: '0 auto', background: '#fff', border: '1px solid #ddd' });
        const lab = document.createElement('div');
        lab.textContent = `${i.id}${i.name ? '\n' + i.name.trim() : ''}`;
        lab.style.cssText = 'margin-top:2px; white-space:pre-line; word-break:break-word';
        cell.append(img, lab);
        grid.appendChild(cell);
      }
      det.appendChild(grid);
      return det;
    }

    // A segmented TAB control (e.g. On | Off), tinted with the scheme's
    // header colors. Selected cell uses the header fill/text; others a light
    // Platinum face. Reads as tabs rather than two separate push buttons.
    // Tab strip from the scheme's popup-window tab cicn (-12319) where it
    // ships one; the selected tab sits flush, the others recessed 2px. Falls
    // back to the CSS segmented control for schemes with no tab cicn.
    async function tabStrip(theme, labels, selectedIdx) {
      const tabs = await Promise.all(labels.map((l, i) => composeTab(theme, { label: l, selected: i === selectedIdx })));
      if (tabs.some((t) => !t)) return segmentedTabs(theme, labels, selectedIdx);
      const h = Math.max(...tabs.map((t) => t.height));
      const wrap = document.createElement('div');
      // Bottom-align: the selected "front" tab cicn is taller, so it pokes up
      // above the shorter "rear" (unselected) tabs — the classic tab look. The
      // cicns already encode the selected/unselected appearance.
      Object.assign(wrap.style, { display: 'inline-flex', alignItems: 'flex-end', height: `${h}px` });
      tabs.forEach((t, i) => {
        const c = bufferToCanvas(t, 1);
        c.style.marginRight = i < tabs.length - 1 ? '-1px' : '0'; // tabs share an edge
        wrap.appendChild(c);
      });
      return wrap;
    }

    function segmentedTabs(theme, labels, selectedIdx) {
      const hc = theme.manifest?.headerColors?.active ?? {};
      const frame = hc.frame ?? '#555555';
      // Selected tab is the depressed/active one: the scheme's (dark) frame
      // color with light text — matches the classic Mac tab look and stays
      // high-contrast even when the header FILL is light (e.g. Platinum gray).
      const selBg = hc.darkTinge && hc.darkTinge !== hc.fill ? hc.darkTinge : frame;
      // A BEVELED segmented toggle matching the references' On/Off: a recessed
      // outer well (1px scheme-frame border + top inset shadow), the selected
      // cell in the scheme's dark header colour with a PRESSED/recessed bevel,
      // the unselected cells a light face with a RAISED bevel. The 3-D treatment
      // (not a flat colour fill) is the thing the references have and a flat
      // segmented control lacks.
      const wrap = document.createElement('div');
      Object.assign(wrap.style, {
        display: 'flex', border: `1px solid ${frame}`,
        font: '11px Charcoal, Geneva, sans-serif',
        boxShadow: 'inset 0 1px 0 rgba(0,0,0,0.28)',
      });
      labels.forEach((label, i) => {
        const cell = document.createElement('div');
        const sel = i === selectedIdx;
        Object.assign(cell.style, {
          flex: '1', textAlign: 'center', padding: '2px 8px',
          borderLeft: i > 0 ? `1px solid ${frame}` : 'none',
          background: sel ? selBg : 'linear-gradient(180deg,#fcfcfc,#d4d4d4)',
          color: sel ? '#ffffff' : '#000', fontWeight: sel ? '700' : '400',
          boxShadow: sel
            ? 'inset 1px 1px 1px rgba(0,0,0,0.5)'        // selected → pressed/recessed
            : 'inset 1px 1px 0 rgba(255,255,255,0.9)',   // unselected → raised highlight
        });
        cell.textContent = label;
        wrap.appendChild(cell);
      });
      return wrap;
    }

    // Compose the canonical Kaleidoscope scheme-preview layout: a "Hello!"
    // Finder window (scheme-name info bar, two folders, a radio/checkbox row,
    // edge scrollbars + grow box) with an overlapping "On/Off" modal dialog
    // (segmented buttons, a progress bar, a disclosure + default OK) — the
    // same arrangement the reference screenshots use, so the live render is
    // directly comparable.
    async function buildScene(theme, state = 'active') {
      const cv = (buf) => bufferToCanvas(buf, 1);
      const place = (buf, css) => { if (!buf) return; const c = cv(buf); Object.assign(c.style, { position: 'absolute', ...css }); return c; };

      // The legacy raster previews show the document window FILLING the canvas
      // (minimal desktop margin) with the Options dialog overlapping the right
      // half from the title-bar line down. So size the desk to the main
      // window's footprint and place the dialog top-right.
      const desk = document.createElement('div');
      // Use the scheme's OWN desktop pattern (1138/1984/beos ship one — keys vary:
      // desktop-pattern / blue-desktop / desktop-background) tiled at native px,
      // not a generic checkerboard. Fall back to the checkerboard for schemes that
      // ship no desktop ppat (1990/evolution/apple-platinum).
      const _pats = theme.manifest.patterns || {};
      const _deskKey = Object.keys(_pats).find((k) => /desktop/i.test(k));
      const _deskUrl = _deskKey && _pats[_deskKey].asset ? `${theme.baseUrl.replace(/\/$/, '')}/${_pats[_deskKey].asset}` : null;
      Object.assign(desk.style, {
        position: 'relative', overflow: 'hidden', background: '#9d9d9d',
        ...(_deskUrl
          ? { backgroundImage: `url("${_deskUrl}")`, backgroundRepeat: 'repeat', imageRendering: 'pixelated' }
          : { backgroundImage: 'repeating-conic-gradient(#9a9a9a 0 25%, #a4a4a4 0 50%)', backgroundSize: '4px 4px' }),
      });

      // ── main "Hello!" Finder window — fills the preview ──
      const winW = 178, winH = 98;
      const win = await renderWindow(theme, { title: 'Hello!', width: winW, height: winH, scale: 1, state });
      // The window root carries its full footprint (cicn path sets width/height;
      // baseline window is sized by content + a ~19px title bar + 1px borders).
      const mainW = parseInt(win.style.width) || (winW + 4);
      const mainH = parseInt(win.style.height) || (winH + 22);
      const contentEl = win.querySelector('.aw-content');
      const mainTop = contentEl && parseInt(contentEl.style.top) ? parseInt(contentEl.style.top) : 19;
      Object.assign(desk.style, { width: `${mainW}px`, height: `${mainH}px` });
      Object.assign(win.style, { position: 'absolute', left: '0', top: '0' });
      const content = win.querySelector('.aw-content');
      if (content) {
        Object.assign(content.style, { overflow: 'hidden' });
        // scheme-name info bar (the Finder window's volume header)
        const info = document.createElement('div');
        info.textContent = theme.manifest?.name ?? '';
        Object.assign(info.style, { position: 'absolute', left: '0', top: '0', right: '0', height: '13px', boxSizing: 'border-box', padding: '1px 4px', borderBottom: '1px solid #aaa', background: '#e6e6e6', font: '9px Charcoal, Geneva, sans-serif', whiteSpace: 'nowrap', overflow: 'hidden' });
        content.appendChild(info);
        // content icons — the scheme's OWN icons where it ships them, else
        // the neutral folder SVGs.
        const folders = document.createElement('div');
        Object.assign(folders.style, { position: 'absolute', left: '8px', top: '18px', display: 'flex', gap: '10px' });
        const icons = await schemeIcons(theme, 2);
        if (icons.length) {
          icons.forEach((ic) => folders.appendChild(ic));
        } else {
          const f1 = document.createElement('div'); f1.innerHTML = ICON_SVG.folderOpen;
          const f2 = document.createElement('div'); f2.innerHTML = ICON_SVG.folder;
          folders.append(f1.firstChild, f2.firstChild);
        }
        content.appendChild(folders);
        // radio / checkbox control row
        const chk = (kind, o) => checkableEl(theme, kind, '', o);
        const ctlRow = document.createElement('div');
        Object.assign(ctlRow.style, { position: 'absolute', left: '8px', top: '52px', display: 'flex', gap: '7px', alignItems: 'center' });
        ctlRow.append(await chk('radio', {}), await chk('radio', { checked: true }), await chk('checkbox', { checked: true }), await chk('checkbox', {}));
        content.appendChild(ctlRow);
        // edge scrollbars + grow box (Finder window furniture)
        const vsb = await composeScrollbar(theme, { orientation: 'vertical', length: winH - 15, value: 0.25 });
        const vc = place(vsb, { right: '0', top: '0' }); if (vc) content.appendChild(vc);
        const hsb = await composeScrollbar(theme, { orientation: 'horizontal', length: winW - 15, value: 0.25 });
        const hc = place(hsb, { left: '0', bottom: '0' }); if (hc) content.appendChild(hc);
        // grow box: the scheme's actual bottom-right resize cicn where shipped,
        // else a plain Platinum-gray corner.
        const growBuf = await composeGrowBox(theme, { state });
        if (growBuf) {
          const gc = place(growBuf, { right: '0', bottom: '0' }); if (gc) content.appendChild(gc);
        } else {
          const grow = document.createElement('div');
          Object.assign(grow.style, { position: 'absolute', right: '0', bottom: '0', width: '15px', height: '15px', background: '#e6e6e6', borderLeft: '1px solid #999', borderTop: '1px solid #999' });
          content.appendChild(grow);
        }
      }
      desk.appendChild(win);

      // ── "On/Off" Options dialog — utility window, overlapping top-right ──
      const DLG_W = 108, DLG_PAD = 5, DLG_INNER = DLG_W - DLG_PAD * 2; // content + usable width
      const dlg = await renderWindow(theme, { windowType: 'titled-utility-window', title: 'Options', width: DLG_W, height: 84, scale: 1, state });
      const dlgW = parseInt(dlg.style.width) || (DLG_W + 4);
      const dlgH = parseInt(dlg.style.height) || (84 + 22);
      // Right-aligned (small margin), top at the main window's title-bar line —
      // the placement the legacy previews use. Clamped to stay inside the desk.
      const dlgLeft = Math.max(0, mainW - dlgW - 6);
      const dlgTop = Math.max(2, Math.min(mainH - dlgH - 4, mainTop));
      Object.assign(dlg.style, { position: 'absolute', left: `${dlgLeft}px`, top: `${dlgTop}px`, zIndex: '5' });
      const dc = dlg.querySelector('.aw-content');
      if (dc) {
        Object.assign(dc.style, { padding: `${DLG_PAD}px`, display: 'flex', flexDirection: 'column', gap: '4px', boxSizing: 'border-box' });
        const btn = async (label, o) => { const b = await composeButton(theme, { label, minWidth: o.minWidth, ...o }); return b ? cv(b) : baselineButton(label, o); };
        // On/Off is a flat 2-SEGMENT TOGGLE, not tabs: the references draw it as
        // a flat rectangular pair (beos: dark "On" / light "Off"; 1984: two flat
        // blue cells), NOT the trapezoidal tab shape — and the scheme's actual
        // "Tabs" cicns (-998x, see composeTab) are gray trapezoids that don't
        // match. So render the header-tinted segmented control directly.
        // On/Off from the scheme's OWN raster: a segmented pair of push-button
        // cicns (9-sliced via their cinf), "On" = the PRESSED face (selected),
        // "Off" = the NORMAL face — the scheme's textured button art, not a CSS
        // approximation. Full-bleed to the dialog's inner edges. Falls back to
        // the beveled CSS segmented toggle when the scheme ships no button cicn.
        const segW = Math.floor(DLG_INNER / 2);
        const onB = await composeButton(theme, { label: 'On', pressed: true, minWidth: segW });
        const offB = await composeButton(theme, { label: 'Off', minWidth: segW });
        const onoff = document.createElement('div');
        Object.assign(onoff.style, { display: 'flex', flexShrink: '0', margin: `-${DLG_PAD}px -${DLG_PAD}px 4px` });
        if (onB && offB) {
          const oc = cv(onB); oc.style.marginRight = '-1px'; // abut (share the seam)
          onoff.append(oc, cv(offB));
        } else {
          onoff.appendChild(segmentedTabs(theme, ['On', 'Off'], 0));
        }
        dc.appendChild(onoff);
        const pg = await composeProgress(theme, { length: DLG_INNER, value: 0.45 });
        if (pg) dc.appendChild(cv(pg));
        const foot = document.createElement('div'); foot.style.cssText = 'display:flex;gap:6px;align-items:center;justify-content:flex-end;margin-top:auto';
        const disc = (await composeDisclosure(theme, { direction: 'right' })) ?? platinumDisclosure({ direction: 'right' });
        foot.appendChild(cv(disc));
        foot.appendChild(await btn('OK', { default: true }));
        dc.appendChild(foot);
      }
      desk.appendChild(dlg);
      return desk;
    }

    // Per-theme diagnostic: the top-edge recipe as a color-coded strip, so we
    // can SEE each segment's part-code role (corner / border / widget / the
    // p5/p6 "title region" / p8 fill) and where the title region sits.
    function diagnosticStrip(theme) {
      const ROLE = { 0: ['#cfcfcf', 'corner'], 1: ['#9a9a9a', 'border'], 2: ['#dd3366', 'close'], 3: ['#dd8800', 'zoom'], 4: ['#33aa88', 'shade'], 5: ['#3cb043', 'TITLE'], 6: ['#3cb043', 'TITLE'], 8: ['#3f7fd0', 'fill'], 10: ['#aa00aa', 'piece'] };
      const pc = (s) => { const m = /^part-(\d+)$/.exec(s || ''); return m ? +m[1] : -1; };
      const wrap = document.createElement('div');
      Object.assign(wrap.style, { margin: '8px 0 0', font: '10px ui-monospace, Menlo, monospace', color: '#333' });
      const wts = theme.manifest.windowTypes || {};
      const wt = wts['document-window'] || Object.values(wts).find((w) => w.edges && w.edges.top && w.edges.top.length);
      const hd = document.createElement('div'); hd.style.cssText = 'opacity:.6;text-transform:uppercase;letter-spacing:.05em;font-size:9px;font-weight:700';

        const refSrc = refMeta ? `./assets/references/${refMeta.ref}` : null;
        const ctx = { themeName: refMeta ? refMeta.label : themeSel.value, slug: themeSel.value, windowType: wtypeSel.value || '(default)', w: +wIn.value, h: +hIn.value, scale: SC, state: stateSel.value };
        if (win._awComposed && win._awComposed.placement && win._awComposed.placement.length) {
          const cicnImg = await loadImgSafe(theme, windowCicn(theme, wtypeSel.value));
          if (my !== token) return;
          out.appendChild(buildSliceView(win, cicnImg, SC, refSrc, ctx));
        } else {
          const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;gap:16px;align-items:flex-start;margin-top:8px;flex-wrap:wrap';
          const box = document.createElement('div'); box.style.cssText = 'flex:0 0 auto;display:inline-block;background:repeating-conic-gradient(#e8e8e8 0 25%,#f4f4f4 0 50%) 0/12px 12px';
          win.style.position = 'relative'; box.appendChild(win);
          const col = document.createElement('div'); col.style.cssText = 'flex:0 0 auto';
          const note = document.createElement('div'); note.style.cssText = 'font:10px ui-monospace,Menlo,monospace;opacity:.6;margin-top:4px'; note.textContent = '(baseline / no wnd# recipe — no slices to inspect)';
          col.append(box, note);
          wrap.appendChild(col);
          const refCol = refColumn(refSrc); if (refCol) wrap.appendChild(refCol);
          out.appendChild(wrap);
        }
      };

      // ── URL-hash state: the controls serialize to location.hash so a refresh
      // restores them; Reset clears it back to defaults. ──
      // Default to a recipe theme (1138) so the playground opens showing slices,
      // not the baseline (no-wnd#) Apple Platinum.
      const DEFAULTS = { theme: '1138', wt: 'document-window', title: 'Hello!', w: '220', h: '120', state: 'active', scale: '2' };
      const writeHash = () => {
        const p = new URLSearchParams({ theme: themeSel.value, wt: wtypeSel.value, title: titleIn.value, w: wIn.value, h: hIn.value, state: stateSel.value, scale: scaleSel.value });
        history.replaceState(null, '', '#' + p.toString());
      };
      const applyControls = (st) => {
        if (st.theme) themeSel.value = st.theme;
        // window types depend on the theme — populate, then apply wt if valid
        return getTheme(themeSel.value).then((theme) => {
          populateWindowTypes(theme);
          if (st.wt && [...wtypeSel.options].some((o) => o.value === st.wt)) wtypeSel.value = st.wt;
          if (st.title !== undefined) titleIn.value = st.title;
          if (st.w) wIn.value = st.w;
          if (st.h) hIn.value = st.h;
          if (st.state) stateSel.value = st.state;
          if (st.scale) scaleSel.value = st.scale;
        });
      };

      themeSel.onchange = async () => { populateWindowTypes(await getTheme(themeSel.value)); writeHash(); rerender(); };
      for (const el of [wtypeSel, stateSel, scaleSel]) el.onchange = () => { writeHash(); rerender(); };
      for (const el of [titleIn, wIn, hIn]) el.oninput = () => { clearTimeout(el._t); el._t = setTimeout(() => { writeHash(); rerender(); }, 250); };
      resetBtn.onclick = async () => { await applyControls(DEFAULTS); history.replaceState(null, '', location.pathname + location.search); rerender(); };

      (async () => {
        const h = location.hash.replace(/^#/, '');
        const st = h ? Object.fromEntries(new URLSearchParams(h)) : DEFAULTS;
        await applyControls(st);
        if (h) writeHash(); // normalize
        rerender();
      })();
    }

    // Apple Platinum baseline ✦ screenshot-sourced — the base Platinum look every
    // cicn-less scheme now inherits, rendered from the apple-platinum-replica
    // bundle's REAL cicns. This SUPERSEDES the old procedural platinumXxx baseline,
    // which survives only as the last-resort `?? ` fallback below.
    {
      const section = document.createElement('div'); section.className = 'theme-row';
      const title = document.createElement('h2'); title.textContent = 'Apple Platinum baseline ✦ screenshot-sourced';
      const row = document.createElement('div'); row.className = 'row';
      section.append(title, row);
      const { c, frame } = colEl('baseline controls (real cicns)');
      const stack = document.createElement('div'); stack.className = 'ctl-stack';
      const r1 = document.createElement('div'); r1.className = 'ctl-row';
      const r2 = document.createElement('div'); r2.className = 'ctl-row';
      const r3 = document.createElement('div'); r3.className = 'ctl-row';
      stack.append(r1, r2, r3); frame.appendChild(stack); row.appendChild(c);
      rows.appendChild(section); // append synchronously to keep section order
      (async () => {
        const base = await loadTheme(themeUrl('apple-platinum-replica'));
        add(r1, (await composeScrollbar(base, { orientation: 'horizontal', length: 140, value: 0.35 })) ?? platinumScrollbar({ orientation: 'horizontal', length: 140, value: 0.35 }));
        add(r1, (await composeScrollbar(base, { orientation: 'vertical', length: 90, value: 0.5 })) ?? platinumScrollbar({ orientation: 'vertical', length: 90, value: 0.5 }));
        add(r1, await composeProgress(base, { length: 120, value: 0.6 }));
        add(r2, (await composeSlider(base, { orientation: 'horizontal', length: 120, value: 0.4 })) ?? platinumSlider({ orientation: 'horizontal', length: 120, value: 0.4 }));
        r2.appendChild(bufferToCanvas((await composeCheckable(base, 'checkbox', { checked: true })) ?? platinumCheckable('checkbox', { checked: true }), 1));
        r2.appendChild(bufferToCanvas((await composeCheckable(base, 'radio', { checked: true })) ?? platinumCheckable('radio', { checked: true }), 1));
        r2.appendChild(bufferToCanvas((await composeDisclosure(base, { direction: 'right' })) ?? platinumDisclosure({ direction: 'right' }), 1));
        r2.appendChild(bufferToCanvas((await composeDisclosure(base, { direction: 'down' })) ?? platinumDisclosure({ direction: 'down' }), 1));
        add(r3, (await composeButton(base, { label: 'Cancel' })) ?? platinumButton({ label: 'Cancel' }));
        add(r3, (await composeButton(base, { label: 'OK', default: true })) ?? platinumButton({ label: 'OK', default: true }));
        add(r3, (await composeButton(base, { label: 'Help', disabled: true })) ?? platinumButton({ label: 'Help', disabled: true }));
      })();
    }

    for (const t of THEMES) {
      const section = document.createElement('div'); section.className = 'theme-row';
      const title = document.createElement('h2'); title.textContent = t.label;
      const row = document.createElement('div'); row.className = 'row';
      section.append(title, row);

      let theme;
      try { theme = await loadTheme(themeUrl(t.slug)); }
      catch (e) { row.textContent = `failed to load: ${e}`; rows.appendChild(section); continue; }

      // scene
      { const { c, frame } = colEl('scene'); const entry = { theme, frame }; scenes.push(entry); await renderScene(entry); row.appendChild(c); }
      // reference — next to the scene for direct side-by-side comparison
      { const { c, frame } = colEl('reference'); const img = document.createElement('img'); img.src = `./assets/references/${t.ref}`; frame.appendChild(img); row.appendChild(c); }
      // controls
      {
        const { c, frame } = colEl('controls');
        const stack = document.createElement('div'); stack.className = 'ctl-stack';
        const r1 = document.createElement('div'); r1.className = 'ctl-row';
        const r2 = document.createElement('div'); r2.className = 'ctl-row';
        add(r1, await composeScrollbar(theme, { orientation: 'horizontal', length: 140, value: 0.35 }));
        add(r1, await composeScrollbar(theme, { orientation: 'vertical', length: 90, value: 0.5 }));
        r2.appendChild(await sliderEl(theme, { orientation: 'horizontal', length: 120, value: 0.4 }));
        add(r2, await composeProgress(theme, { length: 110, value: 0.6 }));
        add(r2, await composeDisclosure(theme, { direction: 'right' }));
        add(r2, await composeDisclosure(theme, { direction: 'down' }));
        stack.append(r1, r2);
        if (!r1.childElementCount && !r2.childElementCount) frame.textContent = '(no themed control cicns — baseline)';
        else frame.appendChild(stack);
        row.appendChild(c);
      }
      // buttons — themed where the scheme ships push-button cicns, else baseline
      {
        const { c, frame } = colEl('buttons');
        const stack = document.createElement('div'); stack.className = 'btn-stack';
        const brow = document.createElement('div'); brow.style.cssText = 'display:flex;gap:6px;align-items:center';
        const btn = async (label, o) => {
          const buf = await composeButton(theme, { label, ...o });
          return buf ? bufferToCanvas(buf, 1) : baselineButton(label, o);
        };
        brow.append(await btn('Cancel', {}), await btn('OK', { default: true }), await btn('Help', { disabled: true }));
        stack.append(brow, await checkableEl(theme, 'checkbox', 'Show invisibles', { checked: true }), await checkableEl(theme, 'radio', 'On', { checked: true }));
        frame.appendChild(stack);
        row.appendChild(c);
      }

      section.appendChild(diagnosticStrip(theme));
      section.appendChild(await sliceInspector(theme));
      section.appendChild(await iconInventory(theme));
      rows.appendChild(section);
    }
  </script>
</body>
</html>
