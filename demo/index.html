<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aaron UI — a web-native runtime for Kaleidoscope themes</title>
  <meta name="description" content="Drop-in window manager + theme engine. Loads freeware-licensed Kaleidoscope schemes (cicn/ppat/cinf/wnd#) and renders them with CSS, SVG, and JS.">
  <style>
    :root {
      /* Themed colors come from --aaron-colr-* (set by loadTheme). These
         are fallbacks for the un-themed flash before the bundled default
         finishes loading. */
      --bg: var(--aaron-colr-bg, #cccccc);
      --fg: var(--aaron-colr-fg, #1a1a1a);
      --accent: var(--aaron-colr-accent, #316ac5);
      --topbar-bg: var(--aaron-colr-titlebar-active-bg, #cccccc);
      --topbar-fg: var(--aaron-colr-titlebar-active-fg, #000000);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Lucida Grande", "Charcoal", sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }
    body { display: flex; flex-direction: column; }

    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: var(--topbar-bg);
      color: var(--topbar-fg);
      border-bottom: 1px solid #888;
      font-size: 13px;
    }
    .topbar h1 { margin: 0; font-size: 16px; font-weight: 700; }
    .topbar .byline { opacity: 0.7; font-size: 12px; }
    .topbar .spacer { flex: 1; }
    .topbar label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .topbar select { padding: 2px 6px; font: inherit; }
    .topbar a { color: inherit; text-decoration: underline; }

    .desktop {
      flex: 1 1 auto;
      position: relative;
      min-height: 580px;
      /* Subtle desktop pattern below the windows. */
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* AaronWindow visual treatment — the chrome cicn paints over these
       fallbacks via inline styles the runtime writes. */
    .aaron-window {
      background: white;
      /* Drop shadow + a thin palette-derived backstop for the un-themed
         flash. Once the cicn samples land (deriveFrameGeometry +
         deriveFrameColor in deriveFrameColor.ts), the .aaron-window__edge
         containers paint the actual scheme-derived frame at the right
         thickness (1-2px for 7 Le, 6px for ErgoBox). */
      box-shadow:
        inset 0 0 0 1px var(--aaron-cicn-frame-color, var(--aaron-colr-window-frame, #666)),
        2px 3px 12px rgba(0,0,0,0.25);
      /* Layout: titlebar fixed-height at top, content fills the rest
         (scrolling if it overflows). Without this, content with a
         tall textarea / large markup would spill below the window
         border instead of staying contained. */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .aaron-titlebar { flex: 0 0 25px; }
    .aaron-content {
      flex: 1 1 auto;
      min-height: 0; /* required so flex item can shrink below content height */
    }
    /* Edge containers sized from --aaron-frame-{bottom,left,right}-px
       stamped on the window by the runtime. Default to 1px fallbacks
       for the un-themed flash; once derived, ErgoBox's 6px beveled
       border lands here. */
    .aaron-window__edge--bottom {
      left: 0; right: 0; bottom: 0;
      height: var(--aaron-frame-bottom-px, 1px);
    }
    .aaron-window__edge--left {
      left: 0; top: 25px; bottom: var(--aaron-frame-bottom-px, 1px);
      width: var(--aaron-frame-left-px, 1px);
    }
    .aaron-window__edge--right {
      right: 0; top: 25px; bottom: var(--aaron-frame-bottom-px, 1px);
      width: var(--aaron-frame-right-px, 1px);
    }
    .aaron-titlebar {
      position: relative;
      height: 25px;
      min-height: 25px;
      border-bottom: 1px solid var(--aaron-colr-window-frame, #888);
      /* Crisp pixel-art rendering when the chrome cicn is stretched
         to fill the titlebar width via applyChromeFromTheme. */
      image-rendering: pixelated;
    }
    .aaron-titlebar__title {
      /* Title-pill positioning (#64.2): when the runtime detects the
         widest fill-segment run in the wnd# top recipe, it stamps
         --aaron-title-pill-{left,right} as %. We use those to keep the
         title inside that safe zone so it doesn't overlap close-box /
         zoom-box / divider decorations. Defaults to inset:0 when the
         runtime didn't set the props (no recipe, or no fill run). */
      position: absolute;
      left: var(--aaron-title-pill-left, 0);
      right: var(--aaron-title-pill-right, 0);
      top: 0;
      bottom: 0;
      padding: 0 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      pointer-events: none;
      overflow: hidden;
      white-space: nowrap;
      color: var(--aaron-colr-titlebar-active-fg, currentColor);
      z-index: 2; /* above chrome segments */
    }
    .aaron-titlebar__title > span {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .aaron-window[data-state="inactive"] .aaron-titlebar__title {
      color: var(--aaron-colr-titlebar-inactive-fg, #888);
    }
    .aaron-content { padding: 14px; line-height: 1.45; overflow: auto; }
    .aaron-content p { margin: 0 0 0.7em; }
    .aaron-content p:last-child { margin-bottom: 0; }
    .aaron-content a { color: var(--accent); }
    .aaron-content code {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 12px;
      padding: 1px 4px;
      background: rgba(0,0,0,0.08);
      border-radius: 2px;
    }
    .aaron-content h3 { margin: 0 0 8px; font-size: 13px; font-weight: 700; }
    .aaron-content .sidebyside {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: start;
    }
    .aaron-content .sidebyside figure { margin: 0; }
    .aaron-content .sidebyside figcaption {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .aaron-content .sidebyside img {
      max-width: 100%;
      height: auto;
      border: 1px solid #aaa;
      image-rendering: pixelated;
    }

    .infobar {
      flex: 0 0 auto;
      padding: 10px 16px;
      background: rgba(0,0,0,0.06);
      border-top: 1px solid #888;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .infobar .provenance { flex: 1; opacity: 0.85; }
    .infobar a { color: inherit; }
    .infobar details summary {
      cursor: pointer;
      font-weight: 700;
      list-style: none;
    }
    .infobar details summary::after { content: ' ▼'; opacity: 0.6; }
    .infobar details[open] summary::after { content: ' ▲'; }
    .infobar details > div {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #888;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 8px;
    }
    .infobar details > div h4 {
      margin: 0 0 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.7;
    }
    .infobar details > div p { margin: 0; }
    .infobar details > div a { display: inline-block; margin-right: 6px; }
  </style>
</head>
<body data-aaron-theme="">
  <div class="topbar">
    <h1>Aaron UI</h1>
    <span class="byline">A web-native runtime for Kaleidoscope themes</span>
    <span class="spacer"></span>
    <label>
      Scheme:
      <select id="scheme-switcher">
        <optgroup label="Platinum-faithful (default test schemes)">
          <option value="masswerk-7-le">mass:werk 7 Le — Norbert Landsteiner</option>
          <option value="masswerk-dark-ergobox2">mass:werk Dark ErgoBox 2 — Norbert Landsteiner</option>
        </optgroup>
        <optgroup label="Exotic (from Kaleidoscope Scheme Archive)">
          <option value="acid">Acid (#1022) — SHIOCOP</option>
          <option value="1138">1138 — Erik Ekengren</option>
          <option value="big-blue">Big Blue is Watching (#1984) — Geoffrey Hamilton</option>
          <option value="1990">1990 — SHIOCOP</option>
          <option value="evolution">1991 evolution — SHIOCOP</option>
        </optgroup>
      </select>
    </label>
    <a href="https://github.com/khawkins98/aaron-ui">GitHub ↗</a>
  </div>

  <div class="desktop" id="desktop"></div>

  <div class="infobar">
    <div class="provenance">
      Currently rendering <strong id="active-scheme-name">…</strong> by
      <a id="active-scheme-author" href="#"><span></span></a>.
      <span id="active-scheme-license"></span>
    </div>
    <details>
      <summary>For developers</summary>
      <div>
        <div>
          <h4>Per-scheme views</h4>
          <p>
            <a href="diagnostics.html">Diagnostics</a>
            <a href="themes-gallery.html">Gallery</a>
          </p>
        </div>
        <div>
          <h4>Runtime fixtures (Phase 4)</h4>
          <p>
            <a href="auto-default-fixture.html">auto-default</a>
            <a href="theme-switcher-fixture.html">theme-switcher</a>
            <a href="theme-loader-fixture.html">theme-loader</a>
          </p>
        </div>
        <div>
          <h4>WM core fixtures (Phase 1)</h4>
          <p>
            <a href="wm-fixture.html">wm</a>
            <a href="scanner-fixture.html">scanner</a>
          </p>
        </div>
        <div>
          <h4>Docs</h4>
          <p>
            <a href="https://github.com/khawkins98/aaron-ui/blob/main/README.md">README</a>
            <a href="https://github.com/khawkins98/aaron-ui/blob/main/docs/porting-a-kaleidoscope-scheme.md">Porting guide</a>
            <a href="https://github.com/khawkins98/aaron-ui/blob/main/LEARNINGS.md">LEARNINGS</a>
          </p>
        </div>
      </div>
    </details>
  </div>

  <script type="module">
    import {
      AaronWindow,
      loadTheme,
      attachThemeToWindow,
      themeRegistry,
      promoteButtons,
      promoteCheckboxes,
      promoteRadios,
      promoteFields,
    } from '../src/index.ts';
    import { loadThemeFromRsrc } from '../src/themes/runtime/loadThemeFromRsrc.ts';

    // Phase 3: prefer runtime resource-fork decoding when scheme.rsrc is
    // available. Falls back to the build-time bundle (theme.json) if not.
    // This is the "load like Kaleidoscope" path — no per-scheme conversion
    // step, the binary IS the theme.
    async function smartLoadTheme(slug) {
      const rsrcUrl = `themes/${slug}/scheme.rsrc`;
      try {
        const head = await fetch(rsrcUrl, { method: 'HEAD' });
        if (head.ok) {
          await loadThemeFromRsrc(rsrcUrl);
          return;
        }
      } catch (err) {
        // Surface .rsrc failures so debugging is possible — silent
        // failure here used to manifest as a dropdown/registry drift
        // where the dropdown showed the requested slug but the footer
        // + render showed the bundled default.
        console.warn(`[demo] scheme.rsrc decode failed for ${slug}; falling back to bundle:`, err);
      }
      // Bundle fallback (theme.json + PNGs).
      try {
        await loadTheme(`themes/${slug}/`);
      } catch (err) {
        console.error(`[demo] both .rsrc and bundle paths failed for ${slug}:`, err);
      }
    }

    const desktop = document.getElementById('desktop');

    // Define the four windows that populate the desktop. Positions are
    // staggered + sized so they're all simultaneously visible on a
    // reasonable viewport without overlap dominating the first paint.
    const windows = [
      {
        title: 'About Aaron UI',
        x: 40, y: 32, width: 380, height: 360,
        html: `
          <h3>What is this?</h3>
          <p>Aaron UI is a web-native runtime for <strong>Kaleidoscope</strong>
          themes — the third-party Mac OS chrome engine that ran on
          System 7 through Mac OS 9. The window you're reading is a real
          <code>AaronWindow</code> instance; its chrome comes from
          decoding <code>cicn</code> + <code>ppat</code> + <code>cinf</code>
          + <code>wnd#</code> resources out of a <code>.ksc</code> file.</p>
          <p>Drag the titlebar. Resize from any edge. Pick a different
          scheme above. The chrome changes; the window keeps its
          contents.</p>
          <p style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
            <button data-aaron-button>Cancel</button>
            <button data-aaron-button disabled>Help</button>
            <button data-aaron-button-default id="demo-ok-button">OK</button>
          </p>
        `,
      },
      {
        title: 'README · scheme provenance',
        x: 440, y: 80, width: 380, height: 280,
        html: `
          <h3 id="readme-title">…</h3>
          <p id="readme-desc">…</p>
          <p><a id="readme-source" href="#">source</a> · freeware,
          redistributed with the original author's permission. The full
          per-bundle <code>PROVENANCE.md</code> lives in
          <a href="https://github.com/khawkins98/aaron-ui/tree/main/themes">themes/&lt;slug&gt;/</a>
          in the repo.</p>
        `,
      },
      {
        title: 'Side-by-side fidelity',
        x: 40, y: 410, width: 460, height: 280,
        html: `
          <div class="sidebyside">
            <figure>
              <figcaption>Original scheme preview</figcaption>
              <img id="reference-img" alt="reference thumbnail">
            </figure>
            <figure>
              <figcaption>Aaron UI render (this page)</figcaption>
              <p style="font-size:12px;opacity:0.7;">The other three
              windows on this page are the live render — same scheme,
              same chrome bitmaps, composited at runtime instead of by
              Kaleidoscope itself.</p>
            </figure>
          </div>
        `,
      },
      {
        title: 'For developers',
        x: 520, y: 380, width: 380, height: 190,
        html: `
          <h3>Three configuration paths</h3>
          <p><code>import 'aaron-ui'</code> — auto-loads the bundled
          default (this page).</p>
          <p><code>import 'aaron-ui/no-default'</code> — same API, no
          auto-load. You own theme loading.</p>
          <p><code>setBundledDefaultUrl('/path/')</code> — override
          where the default fetches from.</p>
          <p>See the developer fixtures at the bottom of the page.</p>
        `,
      },
      {
        title: 'Controls',
        x: 520, y: 90, width: 360, height: 380,
        html: `
          <h3>Phase 3 controls</h3>
          <p>Buttons, checkboxes, radios, fields — all CSS-drawn +
          palette-tinted. None of these were cicn'd by Kaleidoscope.</p>
          <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px;">
            <label><input type="checkbox" data-aaron-checkbox checked> Show invisibles</label>
            <label><input type="checkbox" data-aaron-checkbox> Use scheme's body pattern</label>
            <label><input type="checkbox" data-aaron-checkbox disabled> Disabled option</label>
            <div style="display:flex;gap:14px;margin-top:6px;">
              <label><input type="radio" name="demo-rg" data-aaron-radio value="seven" checked> 7 Le</label>
              <label><input type="radio" name="demo-rg" data-aaron-radio value="ergo"> ErgoBox</label>
              <label><input type="radio" name="demo-rg" data-aaron-radio value="other" disabled> Other</label>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px;">
              <label style="display:flex;gap:6px;align-items:center;">
                Name:
                <input type="text" data-aaron-field value="Susan Kare" style="flex:1;">
              </label>
              <label style="display:flex;gap:6px;align-items:center;">
                Email:
                <input type="email" data-aaron-field placeholder="you@example.com" style="flex:1;">
              </label>
              <label style="display:flex;gap:6px;align-items:center;">
                Locked:
                <input type="text" data-aaron-field value="read-only" readonly style="flex:1;">
              </label>
              <textarea data-aaron-field rows="2" placeholder="Notes…" style="width:100%;"></textarea>
            </div>
          </div>
        `,
      },
    ];

    for (const cfg of windows) {
      const w = new AaronWindow(cfg);
      w.mount(desktop);
      attachThemeToWindow(w.element, { windowTypeSlug: 'document-window' });
    }

    // Phase 3 controls (#71, #72) — promote declarative markup inside
    // window contents. Runs after windows mount.
    promoteButtons(desktop);
    promoteCheckboxes(desktop);
    promoteRadios(desktop);
    promoteFields(desktop);

    // Wire the Controls demo radio group to switch the scheme.
    desktop.querySelectorAll('input[name="demo-rg"]').forEach((r) => {
      r.addEventListener('change', () => {
        if (!r.checked) return;
        if (r.value === 'seven') select.value = 'masswerk-7-le';
        else if (r.value === 'ergo') select.value = 'masswerk-dark-ergobox2';
        else return;
        // Keep the demo radio group on the fast bundle path (it's a UI
        // illustration, not a loader test) — smartLoadTheme adds a few
        // hundred ms for the larger schemes which makes the
        // radio-click → name-update e2e test flaky.
        void loadTheme(`themes/${select.value}/`);
      });
    });
    const okBtn = document.getElementById('demo-ok-button');
    if (okBtn) {
      okBtn.addEventListener('click', () => {
        // Demo activation handler — just log so people can see it works.
        console.info('[demo] OK clicked');
      });
    }

    // Theme switcher — both <select> change and the data-aaron-theme
    // attribute path are supported. The attribute is the declarative
    // version (PRD §Theme system); the <select> is the imperative.
    const select = document.getElementById('scheme-switcher');
    select.addEventListener('change', () => {
      void smartLoadTheme(select.value);
      // Keep the URL in sync so reloads + sharing preserve the picked scheme.
      const u = new URL(location.href);
      u.searchParams.set('theme', select.value);
      history.replaceState(null, '', u.toString());
    });

    // ?theme=<slug> deep-link: load the requested scheme on page load
    // (instead of the bundled default). Useful for sharing a specific
    // scheme + for Playwright screenshot workflows.
    //
    // Implementation: the bundled-default import is a side effect that
    // fires before this script runs, so we can't pre-empt it. Instead,
    // subscribe to the registry and swap when the bundled default
    // settles. The swap then becomes the *last* load → wins the race.
    const urlParams = new URLSearchParams(location.search);
    const requested = urlParams.get('theme');
    if (requested) {
      const validOptions = new Set(
        Array.from(select.options).map((o) => o.value),
      );
      if (!validOptions.has(requested)) {
        console.warn(`[demo] ?theme=${requested} is not a known scheme; ignoring.`);
      } else if (requested === select.value) {
        // Already what the bundled default loads — nothing to do.
      } else {
        select.value = requested;
        // Defer until the bundled default's first settled load lands.
        let applied = false;
        const tryApply = () => {
          if (applied) return;
          applied = true;
          void smartLoadTheme(requested);
        };
        // Either the registry already has the bundled default (synced)
        // or it'll arrive on the next subscribe callback.
        if (themeRegistry.current()) {
          tryApply();
        } else {
          const unsub = themeRegistry.subscribe(() => {
            tryApply();
            unsub();
          });
        }
      }
    }

    // Map theme.name → slug so refreshProvenance can keep the dropdown
    // synced to the ACTUALLY-LOADED scheme (not the user's last request).
    // This prevents the "dropdown shows X, footer shows Y" drift that
    // happens when a load fails silently.
    const SCHEME_NAME_TO_SLUG = {
      'mass:werk 7 Le': 'masswerk-7-le',
      'mass:werk Dark ErgoBox 2': 'masswerk-dark-ergobox2',
      'Acid': 'acid',
      '1138': '1138',
      'Big Blue is Watching': 'big-blue',
      '1990': '1990',
      '1991 evolution': 'evolution',
    };

    // Provenance display updates whenever the theme changes.
    function refreshProvenance(theme) {
      if (!theme) return;
      document.getElementById('active-scheme-name').textContent = theme.name ?? 'unknown';
      // Sync the dropdown + URL to whatever's ACTUALLY loaded (vs what
      // was last requested). If the registry shows scheme X, the
      // dropdown must show X — anything else is a confusing drift.
      const actualSlug = SCHEME_NAME_TO_SLUG[theme.name];
      if (actualSlug && actualSlug !== select.value) {
        select.value = actualSlug;
        const u = new URL(location.href);
        u.searchParams.set('theme', actualSlug);
        history.replaceState(null, '', u.toString());
      }
      const authorEl = document.getElementById('active-scheme-author');
      authorEl.querySelector('span').textContent = theme.author?.name ?? 'unknown';
      if (theme.author?.url) authorEl.href = theme.author.url;
      const licenseEl = document.getElementById('active-scheme-license');
      licenseEl.textContent = theme.origin?.originalLicense
        ? `License: ${theme.origin.originalLicense}`
        : '';

      // README window content.
      const readmeTitle = document.getElementById('readme-title');
      const readmeDesc = document.getElementById('readme-desc');
      const readmeSource = document.getElementById('readme-source');
      readmeTitle.textContent = theme.name ?? '';
      readmeDesc.textContent = theme.author
        ? `By ${theme.author.name}${theme.author.year ? `, ${theme.author.year}` : ''}.`
        : '';
      if (theme.origin?.sourceUrl) readmeSource.href = theme.origin.sourceUrl;

      // Side-by-side reference thumbnail — derive from the loaded theme's
      // slug. For schemes with a dedicated reference jpg (the two mass:werk
      // bundles), use it. For the exotic bundles from the Kaleidoscope
      // archive, fall back to the chrome cicn itself at 4× scale, which is
      // what the dedicated themes-gallery.html page shows.
      const slug = select.value;
      const ref = document.getElementById('reference-img');
      const dedicatedRefs = new Set(['masswerk-7-le', 'masswerk-dark-ergobox2']);
      if (dedicatedRefs.has(slug)) {
        ref.src = `assets/references/${slug}.jpg`;
        ref.style.imageRendering = 'pixelated';
      } else {
        // Use the chrome cicn — it's the author's design intent at native size.
        const active = theme.windowTypes?.['document-window']?.chrome?.active;
        if (active) {
          // active is already a resolved absolute URL after loadTheme.
          ref.src = active;
          ref.style.imageRendering = 'pixelated';
        }
      }
    }
    themeRegistry.subscribe(refreshProvenance);
    refreshProvenance(themeRegistry.current());

    // Expose for in-page debugging from the JS console.
    window.__aaronTheme = { loadTheme, themeRegistry };
  </script>
</body>
</html>
