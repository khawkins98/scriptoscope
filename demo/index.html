<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aaron UI v2 — slice 1</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, system-ui, sans-serif;
      background: #b9b9b9;
      color: #1a1a1a;
      min-height: 100vh;
    }
    header { padding: 20px 24px 0; }
    header h1 { font-size: 18px; margin: 0; }
    header p { margin: 4px 0 0; opacity: 0.65; font-size: 13px; }
    .stage {
      display: flex; flex-wrap: wrap; gap: 40px;
      padding: 28px 24px 48px;
      align-items: flex-start;
    }
    .col { display: flex; flex-direction: column; gap: 10px; }
    .col h2 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      opacity: 0.55; margin: 0; font-weight: 700;
    }
    .frame {
      background: #c8c8c8;
      padding: 28px;
      border: 1px solid #999;
      box-shadow: inset 0 0 0 1px #fff6;
    }
    .reference img {
      image-rendering: pixelated;
      display: block;
      /* native 240×200, shown at integer 2× so it's pixel-comparable */
      width: 480px;
      height: 400px;
    }
    .note { font-size: 12px; opacity: 0.7; max-width: 280px; }
    code { font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Aaron UI <span id="ver"></span> — recipe compositor</h1>
    <p>Document windows composed from each scheme's <code>wnd#</code> recipe (2×), across states + two schemes, beside the references.</p>
  </header>
  <div class="stage" id="stage"></div>
  <div class="stage refs">
    <div class="col reference">
      <h2>7 Le reference (2×)</h2>
      <div class="frame"><img src="./assets/references/masswerk-7-le.jpg" alt="7 Le reference" /></div>
    </div>
    <div class="col reference">
      <h2>ErgoBox 2 reference</h2>
      <div class="frame"><img src="./assets/references/masswerk-dark-ergobox2.jpg" alt="ErgoBox reference" style="width:auto;height:auto;" /></div>
    </div>
  </div>

  <script type="module">
    import { VERSION, loadTheme, renderWindow } from '../src/index.ts';
    document.getElementById('ver').textContent = `v${VERSION}`;
    const stage = document.getElementById('stage');

    const schemes = [
      { slug: 'masswerk-7-le', label: '7 Le' },
      { slug: 'masswerk-dark-ergobox2', label: 'ErgoBox 2' },
    ];
    const states = ['active', 'inactive'];

    for (const s of schemes) {
      const theme = await loadTheme(`/themes/${s.slug}`);
      for (const state of states) {
        const col = document.createElement('div');
        col.className = 'col';
        const h = document.createElement('h2');
        h.textContent = `${s.label} · ${state}`;
        const frame = document.createElement('div');
        frame.className = 'frame';
        try {
          const win = await renderWindow(theme, { title: 'Hello!', width: 200, height: 110, scale: 2, state });
          frame.appendChild(win);
        } catch (err) {
          frame.textContent = String(err);
        }
        col.append(h, frame);
        stage.appendChild(col);
      }
    }
  </script>
</body>
</html>
